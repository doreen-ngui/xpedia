<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xpedia.com - Flights</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/all.css">
</head>
<body>
  <div class="container-fluid mt-2">
    <div class="card">
      <div class="card-header">
        <h5>Search Flights</h5>
      </div>
      <div class="card-body">
        <div id="flightnotifications"></div>
        <div class="row">
          <div class="col-md-3 form-group">
            <label for="fromcity">From</label>
            <input type="text" id="fromcity" class="form-control form-control-sm" placeholder="Departure city">
          </div>
          <div class="col-md-3 form-group">
            <label for="tocity">To</label>
            <input type="text" id="tocity" class="form-control form-control-sm" placeholder="Destination city">
          </div>
          <div class="col-md-3 form-group">
            <label for="departuredate">Departure Date</label>
            <input type="date" id="departuredate" class="form-control form-control-sm">
          </div>
          <div class="col-md-3 form-group">
            <label for="returndate">Return Date</label>
            <input type="date" id="returndate" class="form-control form-control-sm">
          </div>
        </div>
        <div class="row">
          <div class="col-md-3 form-group">
            <label for="passengers">Passengers</label>
            <input type="number" id="passengers" class="form-control form-control-sm" value="1" min="1">
          </div>
          <div class="col-md-3 form-group">
            <label for="cabinclass">Cabin Class</label>
            <select id="cabinclass" class="form-control form-control-sm">
              <option value="economy">Economy</option>
              <option value="business">Business</option>
              <option value="first">First Class</option>
            </select>
          </div>
          <div class="col-md-3 form-group d-flex align-items-end">
            <button id="searchflights" class="btn btn-success btn-sm">
              <i class="fas fa-search"></i> Search Flights
            </button>
          </div>
        </div>

        <table class="table table-sm table-striped mt-3">
          <thead>
            <tr>
              <th>#</th>
              <th>Airline</th>
              <th>Flight</th>
              <th>Departure</th>
              <th>Arrival</th>
              <th>Price</th>
              <th>&nbsp;</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/jquery3.71.js"></script>
  <script src="js/popper.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/flights.js"></script>
</body>
</html>
