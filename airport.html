<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xpedia.com - Airports</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.css">
</head>
<body>
    <div class="container-fluid mt-2">
        <div class="card">
            <div class="card-header"><h5>Filter Options</h5></div>
            <div class="card-body">
                <div id="filterairportnotifications"></div>
                <div class="row">
                    <div class="col form-group">
                        <label for="filterairportcity">City</label>
                        <input type="text" id="filterairportcity" class="form-control form-control-sm">
                    </div>
                    <div class="col form-group">
                        <label for="filterairportname">Airport Name</label>
                        <div class='input-group'>
                            <input type="text" id="filterairportname" class="form-control form-control-sm">
                            <div class='input-group-append'>
                                <button class="btn btn-success btn-sm" id="searchairports"><i class="fas fa-search"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
                <table class="table table-sm table-striped">
                    <thead>
                        <th>#</th><th>Airport Name</th><th>Code</th><th>City</th><th>Airline</th><th>&nbsp;</th>
                    </thead>
                    <tbody></tbody>
                </table>
                <button id="addnewairport" class="btn btn-sm btn-success"><i class="fas fa-plus"></i> Add New Airport</button>
            </div>
        </div>
    </div>

    <div class="modal" tabindex="-1" id="airportdetailsmodal">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Airport Details</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <div class="modal-body">
                <div id="airportdetailsnotifications" class="mb-4"></div>
                <input type="hidden" id="airportid" value="0">
                <div class="form-group">
                    <label for="airportdetailsname">Airport Name</label>
                    <input type="text" id="airportdetailsname" class="form-control form-control-sm">
                </div>
                <div class="form-group">
                    <label for="airportdetailscode">Airport Code</label>
                    <input type="text" id="airportdetailscode" maxlength="5" class="form-control form-control-sm">
                </div>
                <div class="form-group">
                    <label for="airportdetailscity">City</label>
                    <select id="airportdetailscity" class="form-control form-control-sm"></select>
                </div>
                <div class="form-group">
                    <label for="airportdetailsairline">Airline</label>
                    <select id="airportdetailsairline" class="form-control form-control-sm"></select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-success btn-sm" id="saveairport"><i class="fas fa-save fa-lg"></i> Save changes</button>
                <button type="button" class="btn btn-outline-danger btn-sm" data-dismiss="modal"><i class="fas fa-times fa-lg"></i> Close</button>
            </div>
            </div>
        </div>
    </div>
</body>
<script src="js/jquery3.71.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/common.js"></script>
<script src="js/airport.js"></script>
</html>
